<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | SwapForge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profiles">
  <div class="animated-background" aria-hidden="true">
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
    <canvas id="starCanvas"></canvas>
  </div>

  <header class="topbar thin">
    <a href="profiles.html"><img src="Assets/Images/Title.png" class="title-image small" alt="SwapForge" /></a>
    <div class="top-actions">
      <a id="profileLink" class="icon-btn" href="profile.html"><i data-lucide="user-round"></i><span id="profileLabel">Profile</span></a>
      <a class="icon-btn" href="alerts.html"><i data-lucide="bell"></i>Alerts <span id="alertDot" class="alert-dot"></span><span id="alertCount" class="alert-count"></span></a>
      <button id="logoutBtn" class="ghost-btn"><i data-lucide="log-out"></i>Log out</button>
    </div>
  </header>

  <main class="container with-bottom-nav">
    <h1>User Dashboard</h1>
    <p class="muted">Browse users and send invites based on talents.</p>
    <input id="profileSearch" type="search" class="search-input" placeholder="Search by name, email, or talent..." />
    <p id="dashboardStatus" class="status"></p>
    <section id="profilesList" class="stack-list"></section>
  </main>

  <nav class="bottom-bar">
    <a href="find-match.html" class="bottom-link"><i data-lucide="scan-search"></i><span>Find my match</span></a>
    <a href="settings.html" class="bottom-link"><i data-lucide="settings"></i><span>Settings</span></a>
    <button class="bottom-link" data-action="toggle-theme"><i data-lucide="sun-moon"></i><span>Theme</span></button>
    <a href="connections.html" class="bottom-link"><i data-lucide="users"></i><span>Current connections</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.453.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
